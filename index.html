<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial NPV Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 30px;
        }
        
        .input-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
        }
        
        .input-section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .cash-flows {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
            border: 2px solid #ddd;
            border-radius: 5px;
            padding: 10px;
            background: white;
        }
        
        .cash-flow-item {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        
        .cash-flow-item input {
            margin: 0;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: rgb(255, 255, 255);
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        .results-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
        }
        
        .results-section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        
        .result-box {
            background: white;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }
        
        .result-label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }
        
        .result-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #667eea;
        }
        
        .result-value.positive {
            color: #28a745;
        }
        
        .result-value.negative {
            color: #dc3545;
        }
        
        .charts {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        
        .chart-container {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            position: relative;
            height: 400px;
        }
        
        canvas {
            max-height: 350px;
        }
        
        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
            
            .charts {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Financial NPV Calculator</h1>
            <p>Calculate Net Present Value with visual analysis</p>
        </div>
        
        <div class="content">
            <div class="input-section">
                <h2>Input Parameters</h2>
                
                <div class="form-group">
                    <label for="discount">Discount Rate (%):</label>
                    <input type="number" id="discount" placeholder="e.g., 10" value="10" step="0.1">
                </div>
                
                <div class="form-group">
                    <label for="initial">Initial Investment ($):</label>
                    <input type="number" id="initial" placeholder="e.g., 100000" value="100000" step="0.01">
                </div>
                
                <h3 style="color: #667eea; margin-top: 20px; margin-bottom: 10px;">Cash Flows by Year</h3>
                <div class="cash-flows" id="cashFlowsContainer">
                    <div class="cash-flow-item">
                        <input type="number" class="cash-flow" placeholder="Year 1" value="30000" step="0.01">
                        <button onclick="removeCashFlow(this)" style="width: auto; padding: 5px 10px;">✕</button>
                    </div>
                </div>
                
                <button onclick="addCashFlow()">+ Add Year</button>
                <button onclick="calculateNPV()" style="background: linear-gradient(135deg, #28a745 0%, #20c997 100%); margin-top: 20px;">Calculate NPV</button>
            </div>
            
            <div class="results-section">
                <h2>Results</h2>
                
                <div class="result-box">
                    <div class="result-label">Net Present Value (NPV)</div>
                    <div class="result-value" id="npvResult">-</div>
                </div>
                
                <div class="result-box">
                    <div class="result-label">Payback Period (years)</div>
                    <div class="result-value" id="paybackResult">-</div>
                </div>
                
                <div class="result-box">
                    <div class="result-label">Profitability Index</div>
                    <div class="result-value" id="piResult">-</div>
                </div>
                
                <div class="result-box">
                    <div class="result-label">Total Inflow</div>
                    <div class="result-value" id="inflowResult">-</div>
                </div>
            </div>
            
            
        </div>
    </div>
    
    <script>
        function addCashFlow() {
            const container = document.getElementById('cashFlowsContainer');
            const item = document.createElement('div');
            item.className = 'cash-flow-item';
            item.innerHTML = `
                <input type="number" class="cash-flow" placeholder="Year ${container.children.length + 1}" step="0.01">
                <button onclick="removeCashFlow(this)" style="width: auto; padding: 5px 10px;">✕</button>
            `;
            container.appendChild(item);
        }

        function removeCashFlow(btn) {
            btn.parentElement.remove();
        }

        function calculateNPV() {
            const discountRate = parseFloat(document.getElementById('discount').value) / 100;
            const initialInvestment = parseFloat(document.getElementById('initial').value);
            const cashFlowInputs = document.querySelectorAll('.cash-flow');

            if (!discountRate || !initialInvestment || cashFlowInputs.length === 0) {
                alert('Please fill in all required fields');
                return;
            }

            const cashFlows = Array.from(cashFlowInputs).map(input => parseFloat(input.value) || 0);

            // Calculate NPV
            let npv = -initialInvestment;
            cashFlows.forEach((cf, index) => {
                const pv = cf / Math.pow(1 + discountRate, index + 1);
                npv += pv;
            });

            // Calculate Payback Period
            let payback = Infinity;
            let cumulative = -initialInvestment;
            for (let i = 0; i < cashFlows.length; i++) {
                cumulative += cashFlows[i];
                if (cumulative >= 0) {
                    payback = i + 1 - (cumulative - cashFlows[i]) / cashFlows[i];
                    break;
                }
            }

            // Calculate Profitability Index
            const totalInflow = cashFlows.reduce((a, b) => a + b, 0);
            const pv_inflows = cashFlows.reduce((sum, cf, i) => sum + (cf / Math.pow(1 + discountRate, i + 1)), 0);
            const pi = pv_inflows / initialInvestment;

            // Display Results
            document.getElementById('npvResult').textContent = `$${npv.toFixed(2)}`;
            document.getElementById('npvResult').className = `result-value ${npv >= 0 ? 'positive' : 'negative'}`;

            document.getElementById('paybackResult').textContent = payback === Infinity ? 'N/A' : `${payback.toFixed(2)}`;
            document.getElementById('piResult').textContent = `${pi.toFixed(2)}`;
            document.getElementById('inflowResult').textContent = `$${totalInflow.toFixed(2)}`;
        }
    </script>
</body>
</html>
